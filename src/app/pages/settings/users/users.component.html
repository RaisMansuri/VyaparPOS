<div class="card">
    <p-table #dt [value]="users" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading"
        [paginator]="true" [globalFilterFields]="globalFilterFields" [tableStyle]="{ 'width': '100%' }"
        styleClass="custom-table">
        <ng-template #caption>
            <div class="flex justify-between items-center flex-wrap gap-3 mb-2">
                <h3 class="m-0 mr-4">Manage Users</h3>
                <div class="flex gap-2">
                    <div class="search-action-group">
                        <p-iconfield>
                            <p-inputicon class="pi pi-search"></p-inputicon>
                            <input pInputText type="text"
                                (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                                placeholder="Search users..." />
                        </p-iconfield>
                    </div>
                    <div class="ml-auto">
                        <button pButton pRipple label="New User" icon="pi pi-plus" class="p-button-success shadow-1"
                            (click)="openNew()"></button>
                    </div>
                </div>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th style="width:20%">Name</th>
                <th style="width:25%">Email</th>
                <th style="width:15%">
                    <div class="flex items-center">
                        Role
                        <p-columnFilter type="text" field="role" display="menu">
                            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                                <p-dropdown [ngModel]="value" [options]="roles" (onChange)="filter($event.value)"
                                    placeholder="Any">
                                </p-dropdown>
                            </ng-template>
                        </p-columnFilter>
                    </div>
                </th>
                <th style="width:15%">Status</th>
                <th style="width:25%">Permissions</th>
                <th style="width:10%; text-align: center;">Actions</th>
            </tr>
        </ng-template>

        <ng-template #body let-user>
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>
                    <p-tag [value]="user.role" [severity]="getRoleSeverity(user.role)"></p-tag>
                </td>
                <td>
                    <div class="flex items-center gap-2">
                        <p-inputSwitch [(ngModel)]="user.status" trueValue="Active" falseValue="Inactive"
                            (onChange)="onStatusChange(user)"></p-inputSwitch>
                        <p-tag [value]="user.status" [severity]="getSeverity(user.status)"></p-tag>
                    </div>
                </td>
                <td>
                    <div class="flex gap-1 flex-wrap">
                        <p-tag *ngFor="let perm of user.permissions" [value]="perm" [rounded]="true"
                            styleClass="text-xs"></p-tag>
                    </div>
                </td>
                <td>
                    <div class="flex gap-2 justify-content-center">
                        <button pButton pRipple icon="pi pi-pencil" class="btn-action-edit"
                            (click)="editUser(user)"></button>
                        <button pButton pRipple icon="pi pi-trash" class="btn-action-delete"
                            (click)="deleteUser(user)"></button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="6">No users found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="userDialog" [style]="{ width: '90vw', maxWidth: '500px' }" [modal]="true"
    styleClass="p-fluid modern-dialog" [draggable]="false" [resizable]="false">
    <ng-template pTemplate="header">
        <div class="flex align-items-center gap-3 w-full custom-header-container">
            <div class="header-icon-box">
                <i class="pi pi-user text-success"></i>
            </div>
            <div class="header-text-stack">
                <span class="dialog-title">Add User</span>
                <span class="dialog-subtitle">Configure user profile and access levels</span>
            </div>
        </div>
    </ng-template>

    <ng-template pTemplate="content">
        <div class="premium-form">
            <!-- User Info Section -->
            <h6 class="section-title">USER INFO</h6>

            <div class="field mb-4 full-width-field">
                <label for="name" class="premium-label">Full name <span class="required-mark">*</span></label>
                <input type="text" pInputText id="name" [(ngModel)]="user.name" placeholder="e.g. John Doe"
                    [class.p-invalid]="submitted && !user.name" required autofocus />
                <small class="p-error block mt-1" *ngIf="submitted && !user.name">Name is required.</small>
            </div>

            <div class="field mb-4 full-width-field">
                <label for="email" class="premium-label">Email address <span class="required-mark">*</span></label>
                <input type="email" pInputText id="email" [(ngModel)]="user.email" placeholder="e.g. john@example.com"
                    [class.p-invalid]="submitted && !user.email" required />
                <small class="p-error block mt-1" *ngIf="submitted && !user.email">Email is required.</small>
            </div>

            <div class="divider-hr"></div>

            <!-- Access Control Section -->
            <h6 class="section-title">ACCESS CONTROL</h6>

            <div class="premium-grid mb-4">
                <div class="premium-col field">
                    <label for="role" class="premium-label">System role <span class="required-mark">*</span></label>
                    <p-dropdown [(ngModel)]="user.role" inputId="role" [options]="roles" placeholder="Select role"
                        appendTo="body" [class.p-invalid]="submitted && !user.role">
                    </p-dropdown>
                </div>

                <div class="premium-col field">
                    <label class="premium-label">Active status</label>
                    <div class="status-field-container">
                        <span class="status-label">{{ user.status }}</span>
                        <p-inputSwitch [(ngModel)]="user.status" trueValue="Active"
                            falseValue="Inactive"></p-inputSwitch>
                    </div>
                </div>
            </div>

            <div class="field full-width-field">
                <label for="permissions" class="premium-label">Permissions</label>
                <p-multiSelect [options]="availablePermissions" [(ngModel)]="user.permissions"
                    defaultLabel="Select permissions" display="chip" [filter]="false" [showClear]="true" appendTo="body"
                    class="premium-multiselect">
                </p-multiSelect>
            </div>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-3 p-4">
            <button pButton pRipple label="Cancel" class="p-button-outlined p-button-secondary premium-footer-btn"
                (click)="hideDialog()"></button>
            <button pButton pRipple label="Save" class="premium-footer-btn-save" (click)="saveUser()"></button>
        </div>
    </ng-template>
</p-dialog>

<p-toast></p-toast>
<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
