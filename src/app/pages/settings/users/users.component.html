<div class="card">
    <p-table #dt [value]="users" dataKey="id" [rows]="10" [rowsPerPageOptions]="[10, 25, 50]" [loading]="loading"
        [paginator]="true" [globalFilterFields]="globalFilterFields" [tableStyle]="{ 'width': '100%' }"
        styleClass="custom-table">
        <ng-template #caption>
            <div class="flex justify-between items-center">
                <h3 class="m-0">Manage Users</h3>
                <div class="flex gap-2">
                    <span class="p-input-icon-left">
                        <i class="pi pi-search"></i>
                        <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                            placeholder="Search keyword" />
                    </span>
                    <button pButton pRipple label="New User" icon="pi pi-plus" class="p-button-success"
                        (click)="openNew()"></button>
                </div>
            </div>
        </ng-template>

        <ng-template #header>
            <tr>
                <th style="width:20%">Name</th>
                <th style="width:25%">Email</th>
                <th style="width:15%">
                    <div class="flex items-center">
                        Role
                        <p-columnFilter type="text" field="role" display="menu">
                            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                                <p-dropdown [ngModel]="value" [options]="roles" (onChange)="filter($event.value)"
                                    placeholder="Any">
                                </p-dropdown>
                            </ng-template>
                        </p-columnFilter>
                    </div>
                </th>
                <th style="width:15%">Status</th>
                <th style="width:25%">Permissions</th>
                <th style="width:10%; text-align: center;">Actions</th>
            </tr>
        </ng-template>

        <ng-template #body let-user>
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>
                    <p-tag [value]="user.role" [severity]="getRoleSeverity(user.role)"></p-tag>
                </td>
                <td>
                    <div class="flex items-center gap-2">
                        <p-inputSwitch [(ngModel)]="user.status" trueValue="Active" falseValue="Inactive"
                            (onChange)="onStatusChange(user)"></p-inputSwitch>
                        <p-tag [value]="user.status" [severity]="getSeverity(user.status)"></p-tag>
                    </div>
                </td>
                <td>
                    <div class="flex gap-1 flex-wrap">
                        <p-tag *ngFor="let perm of user.permissions" [value]="perm" [rounded]="true"
                            styleClass="text-xs"></p-tag>
                    </div>
                </td>
                <td>
                    <div class="flex gap-2 justify-content-center">
                        <button pButton pRipple icon="pi pi-pencil"
                            class="p-button-rounded p-button-text p-button-info" (click)="editUser(user)"></button>
                        <button pButton pRipple icon="pi pi-trash"
                            class="p-button-rounded p-button-text p-button-danger"
                            (click)="deleteUser(user)"></button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template #emptymessage>
            <tr>
                <td colspan="6">No users found.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog [(visible)]="userDialog" [style]="{ width: '450px' }" header="User Details" [modal]="true"
    styleClass="p-fluid">
    <ng-template pTemplate="content">
        <div class="field" style="margin-bottom: 1.5rem;">
            <label for="name">Name</label>
            <input type="text" pInputText id="name" [(ngModel)]="user.name" required autofocus />
            <small class="p-error block" *ngIf="submitted && !user.name">Name is required.</small>
        </div>

        <div class="field" style="margin-bottom: 1.5rem;">
            <label for="email">Email</label>
            <input type="email" pInputText id="email" [(ngModel)]="user.email" required />
            <small class="p-error block" *ngIf="submitted && !user.email">Email is required.</small>
        </div>

        <div class="field" style="margin-bottom: 1.5rem;">
            <label for="role">Role</label>
            <p-dropdown [(ngModel)]="user.role" inputId="role" [options]="roles" placeholder="Select a Role">
            </p-dropdown>
            <small class="p-error block" *ngIf="submitted && !user.role">Role is required.</small>
        </div>

        <div class="field" style="margin-bottom: 1.5rem;">
            <label for="permissions">Permissions</label>
            <p-multiSelect [options]="availablePermissions" [(ngModel)]="user.permissions"
                defaultLabel="Select Permissions" display="chip" [filter]="false" [showClear]="true">
            </p-multiSelect>
        </div>

        <div class="field flex items-center gap-2" style="margin-bottom: 1.5rem;">
            <label for="status" class="mb-0">Active Status</label>
            <p-inputSwitch [(ngModel)]="user.status" trueValue="Active" falseValue="Inactive"></p-inputSwitch>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <button pButton pRipple label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>
        <button pButton pRipple label="Save" icon="pi pi-check" class="p-button-text" (click)="saveUser()"></button>
    </ng-template>
</p-dialog>

<p-toast></p-toast>
<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
