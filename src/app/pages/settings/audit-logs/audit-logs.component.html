<div class="audit-logs-container p-4">
  <p-card styleClass="shadow-2 border-round-xl overflow-hidden">
    <ng-template pTemplate="header">
      <div class="p-4 bg-primary text-white">
        <div class="search-action-group">
          <div class="header-title-group">
            <h2 class="m-0 text-xl font-bold"><i class="pi pi-shield mr-2"></i> System Audit Logs</h2>
            <p class="m-0 text-white-alpha-70 text-sm">Track all sensitive business activities and changes</p>
          </div>
          <div class="action-buttons">
            <button pButton label="Excel" icon="pi pi-file-excel" class="p-button-outlined p-button-secondary text-white-alpha-90 mr-2"
              (click)="exportExcel()"></button>
            <button pButton label="PDF" icon="pi pi-file-pdf" class="p-button-outlined p-button-secondary text-white-alpha-90 mr-2"
              (click)="exportPDF()"></button>
            <button pButton icon="pi pi-refresh" class="p-button-rounded p-button-text text-white" (click)="loadLogs()"></button>
          </div>
        </div>
      </div>
    </ng-template>

    <div class="p-3">
      <div class="search-action-group mb-4">
        <p-iconfield class="w-full">
          <p-inputicon class="pi pi-search"></p-inputicon>
          <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
            placeholder="Search by action, user or entity..." class="w-full" />
        </p-iconfield>
      </div>

      <p-table #dt [value]="logs" [rows]="10" [paginator]="true" [loading]="loading"
        [globalFilterFields]="['action', 'entityType', 'userId', 'ipAddress']"
        responsiveLayout="scroll" styleClass="p-datatable-sm modern-table"
        [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} logs">
        
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="timestamp">Time <p-sortIcon field="timestamp"></p-sortIcon></th>
            <th pSortableColumn="action">Action <p-sortIcon field="action"></p-sortIcon></th>
            <th pSortableColumn="entityType">Entity <p-sortIcon field="entityType"></p-sortIcon></th>
            <th pSortableColumn="userId">User <p-sortIcon field="userId"></p-sortIcon></th>
            <th>IP Address</th>
            <th class="text-right">Details</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-log>
          <tr>
            <td>{{ log.timestamp | date:'short' }}</td>
            <td>
              <p-tag [value]="log.action" [severity]="getActionSeverity(log.action)"></p-tag>
            </td>
            <td><span class="font-medium">{{ log.entityType }}</span> <br> <small class="text-secondary">{{ log.entityId }}</small></td>
            <td><code class="text-xs">{{ log.userId }}</code></td>
            <td><small>{{ log.ipAddress || 'Internal' }}</small></td>
            <td class="text-right">
              <button pButton icon="pi pi-eye" class="p-button-text p-button-sm" [pTooltip]="'View JSON Data'"></button>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6" class="text-center p-5">
              <i class="pi pi-info-circle text-2xl text-secondary mb-2"></i>
              <p>No activity logs found for this period.</p>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </p-card>
</div>
