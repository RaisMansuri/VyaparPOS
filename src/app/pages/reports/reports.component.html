<div class="reports-page">
  <div class="header">
    <h2>Sales Reports & Analytics</h2>
  </div>

  <div class="grid">
    <div class="col-12 lg:col-8">
      <p-card header="Weekly Revenue">
        <p-chart type="line" [data]="lineData" [options]="chartOptions"></p-chart>
      </p-card>
    </div>
    <div class="col-12 lg:col-4">
      <p-card header="Sales by Category">
        <p-chart type="pie" [data]="pieData"></p-chart>
      </p-card>
    </div>
  </div>

  <div class="grid mt-4">
    <div class="col-12">
      <p-card header="Performance Summary">
        <div class="summary-stats">
          <div class="stat-item">
            <span class="label">Total Revenue</span>
            <span class="value">₹1,28,000</span>
          </div>
          <div class="stat-item">
            <span class="label">Total Orders</span>
            <span class="value">490</span>
          </div>
          <div class="stat-item">
            <span class="label">Average Order Value</span>
            <span class="value">₹261</span>
          </div>
          <div class="stat-item">
            <span class="label">Top Category</span>
            <span class="value">Breads</span>
          </div>
        </div>
      </p-card>
    </div>
  </div>
</div>
