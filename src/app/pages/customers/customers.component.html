<div class="customers-page">
  <p-toast></p-toast>
  <div class="header">
    <div class="title-group">
      <h1>Customer Database</h1>
      <p>Manage your loyal customers and their spending habits.</p>
    </div>
    <button pButton label="Add Customer" icon="pi pi-user-plus" class="p-button-primary shadow-2" (click)="openNew()"></button>
  </div>

  <div class="card-modern">
    <p-table #dt [value]="customers" [paginator]="true" [rows]="10" responsiveLayout="scroll" styleClass="p-datatable-sm modern-table"
      [globalFilterFields]="['name', 'email', 'phone']">
      
      <ng-template #caption>
        <div class="flex justify-start items-center flex-wrap gap-3 mb-2">
            <h3 class="m-0 mr-4">Customer Lists</h3>
            <div class="search-action-group">
                <p-iconfield>
                    <p-inputicon class="pi pi-search"></p-inputicon>
                    <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')"
                        placeholder="Search customers..." />
                </p-iconfield>
            </div>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>Customer</th>
          <th>Contact</th>
          <th class="text-center">Orders</th>
          <th class="text-right">Total Spent</th>
          <th class="text-center">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-customer>
        <tr>
          <td>
            <div class="customer-cell">
              <div class="avatar">{{ customer.name.charAt(0) }}</div>
              <div class="info">
                <span class="name">{{ customer.name }}</span>
                <small class="id">{{ customer.id }}</small>
              </div>
            </div>
          </td>
          <td>
            <div class="contact-cell">
              <span><i class="pi pi-envelope mr-1"></i>{{ customer.email }}</span>
              <span><i class="pi pi-phone mr-1"></i>{{ customer.phone }}</span>
            </div>
          </td>
          <td class="text-center"><p-tag [value]="customer.totalOrders" severity="info"></p-tag></td>
          <td class="text-right font-bold">{{ customer.totalSpent | currency:'INR' }}</td>
          <td class="text-center">
            <button pButton icon="pi pi-pencil" class="btn-action-edit mr-2" (click)="editCustomer(customer)"></button>
            <button pButton icon="pi pi-trash" class="btn-action-delete" (click)="deleteCustomer(customer)"></button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog [(visible)]="showDialog" [header]="editingCustomerId ? 'Edit Customer' : 'Add New Customer'" [modal]="true" styleClass="p-fluid">
    <ng-template pTemplate="content">
      <form [formGroup]="customerForm">
        <div class="field mb-3">
          <label for="name">Name</label>
          <input pInputText id="name" formControlName="name" />
        </div>
        <div class="field mb-3">
          <label for="email">Email</label>
          <input pInputText id="email" formControlName="email" />
        </div>
        <div class="field mb-3">
          <label for="phone">Phone</label>
          <input pInputText id="phone" formControlName="phone" />
        </div>
        <div class="field mb-3">
          <label for="address">Address</label>
          <input pInputText id="address" formControlName="address" />
        </div>
        <div class="field mb-3">
          <label for="notes">Notes</label>
          <input pInputText id="notes" formControlName="notes" />
        </div>
      </form>
    </ng-template>
    <ng-template pTemplate="footer">
      <button pButton label="Cancel" icon="pi pi-times" class="p-button-text" (click)="showDialog = false"></button>
      <button pButton label="Save" icon="pi pi-check" class="p-button-text" (click)="saveCustomer()"></button>
    </ng-template>
  </p-dialog>
</div>
